{{- include "sentinel.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sentinel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ ((.Values.global).imageRegistry) | default .Values.image.registry }}/{{ .Values.image.repository }}:{{ ((.Values.global).imageTag) | default .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
          - serve
          - --config=/etc/hyperfleet/config.yaml
        ports:
          - name: http
            containerPort: 8080
            protocol: TCP
          - name: metrics
            containerPort: 9090
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        env:
          # Broker configuration file location
          - name: BROKER_CONFIG_FILE
            value: /etc/hyperfleet/broker.yaml
          # Broker credentials can be overridden via environment variables from Secret
          {{- if eq .Values.broker.type "rabbitmq" }}
          - name: BROKER_RABBITMQ_URL
            valueFrom:
              secretKeyRef:
                name: {{ include "sentinel.secretName" . }}
                key: BROKER_RABBITMQ_URL
          {{- end }}
          {{- with .Values.tracing }}
          - name: HYPERFLEET_TRACING_ENABLED
            value: {{ .enabled | quote }}
          {{- if .enabled }}
          - name: OTEL_SERVICE_NAME
            value: {{ .serviceName | quote }}
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: {{ .otlpEndpoint | quote }}
          - name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: {{ .otlpProtocol | quote }}
          - name: OTEL_TRACES_SAMPLER
            value: {{ .sampler | quote }}
          - name: OTEL_TRACES_SAMPLER_ARG
            value: {{ .samplerArg | quote }}
          - name: OTEL_PROPAGATORS
            value: {{ .propagators | quote }}
          - name: K8S_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: OTEL_RESOURCE_ATTRIBUTES
            value: "k8s.namespace.name=$(K8S_NAMESPACE)"
          {{- end }}
          {{- end }}
        volumeMounts:
          - name: config
            mountPath: /etc/hyperfleet/config.yaml
            subPath: config.yaml
            readOnly: true
          - name: broker-config
            mountPath: /etc/hyperfleet/broker.yaml
            subPath: broker.yaml
            readOnly: true
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "sentinel.fullname" . }}-config
        - name: broker-config
          configMap:
            name: {{ include "sentinel.fullname" . }}-broker-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
