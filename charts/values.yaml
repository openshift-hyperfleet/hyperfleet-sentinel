# Default values for sentinel.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Replica count for horizontal scaling
replicaCount: 1

# Container image configuration
image:
  registry: CHANGE_ME
  repository: CHANGE_ME # e.g. openshift-hyperfleet/hyperfleet-sentinel
  pullPolicy: Always
  # Required: image tag (e.g. git SHA, semver tag). No default — must be set at install time.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  # Note: For GCP Pub/Sub with Workload Identity Federation, no annotations are
  # needed. Use `gcloud projects add-iam-policy-binding` with the principal://
  # format instead. See docs/running-sentinel.md for details.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}
podLabels: {}

# Pod security context
podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532

# Container security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Extra volumes to add to the pod
extraVolumes: []
# - name: example-volume
#   emptyDir: {}

# Extra volume mounts to add to the container
extraVolumeMounts: []
# - name: example-volume
#   mountPath: /example

# PodDisruptionBudget configuration
# See: https://kubernetes.io/docs/tasks/run-application/configure-pdb/#specifying-a-poddisruptionbudget
podDisruptionBudget:
  # Enable PDB creation
  enabled: true
  # Maximum number of pods that can be unavailable during voluntary disruptions
  maxUnavailable: 1

# Sentinel configuration
config:
  # Sentinel information
  sentinel:
    # Sentinel component name - will be templated with shard value if resource selector is used
    # Example: hyperfleet-sentinel-clusters-shard-1
    name: hyperfleet-sentinel-{{ .Values.config.resourceType }}

  # Debug configuration - log merged config on startup
  debugConfig: false

  # Logging configuration
  log:
    level: info
    format: json
    output: stdout

  # Client configurations
  clients:
    # HyperFleet API client configuration
    hyperfleetApi:
      # Use in-cluster service name for API endpoint
      baseUrl: http://hyperfleet-api:8000
      version: v1
      timeout: 10s

  # Resource type to watch (clusters, nodepools)
  resourceType: clusters

  # How often to poll the API for resource updates
  pollInterval: 5s

  # Configurable CEL-based decision logic
  # Params are named CEL expressions evaluated in dependency order.
  # Result is a CEL boolean expression that determines whether to publish an event.
  messageDecision:
    params:
      ref_time: 'condition("Ready").last_updated_time'
      is_ready: 'condition("Ready").status == "True"'
      has_ref_time: 'ref_time != ""'
      is_new_resource: '!is_ready && resource.generation == 1'
      generation_mismatch: 'resource.generation > condition("Ready").observed_generation'
      ready_and_stale: 'is_ready && has_ref_time && now - timestamp(ref_time) > duration("30m")'
      not_ready_and_debounced: '!is_ready && has_ref_time && now - timestamp(ref_time) > duration("10s")'
    result: 'is_new_resource || generation_mismatch || ready_and_stale || not_ready_and_debounced'

  # Resource selector for horizontal sharding
  # Deploy multiple Sentinel instances with different shard values
  resourceSelector:
    - label: shard
      value: "1"

  # CloudEvents data payload configuration
  messageData:
    id: resource.id
    kind: resource.kind
    href: resource.href
    generation: resource.generation
#  For nodepools, the message should contain owner_references
#  owner_references:
#    id: "resource.owner_references.id"
#    href: "resource.owner_references.href"
#    kind: "resource.owner_references.kind"


# Broker configuration
# WARNING: Never commit real credentials to git!
# Use external secrets management (External Secrets Operator, Sealed Secrets, Vault)
broker:
  # For more details, see: https://github.com/openshift-hyperfleet/hyperfleet-broker
  # Broker type: rabbitmq or googlepubsub
  type: rabbitmq

  # Topic name for broker publishing
  # This is the full topic name where events will be published
  # Default uses Helm template: {namespace}-{resourceType} for multi-tenant isolation
  # Example result: hyperfleet-dev-clusters, hyperfleet-dev-nodepools
  # Override with a static value if needed: topic: "my-custom-topic"
  topic: '{{ .Release.Namespace }}-{{ .Values.config.resourceType }}'

  # RabbitMQ configuration
  # Uses BROKER_RABBITMQ_URL environment variable (single connection string)
  rabbitmq:
    # Connection URL format: amqp://user:password@host:port/vhost
    url: amqp://<USER>:<PASSWORD>@rabbitmq.hyperfleet-system.svc.cluster.local:5672/hyperfleet
    exchangeType: topic

  # Google Pub/Sub configuration (alternative to RabbitMQ)
  # projectId is written to broker.yaml ConfigMap (not Secret - it's not sensitive)
  googlepubsub:
    #REQUIRED: Replace with your actual GCP project ID
    projectId: your-gcp-project-id
    maxOutstandingMessages: 1000
    numGoroutines: 10
    # Auto-creation flags (default: false - manual creation required)
    # Set to true to automatically create topics/subscriptions if they don't exist
    createTopicIfMissing: false

# Monitoring configuration for Google Cloud Managed Prometheus (GMP)
monitoring:
  # PodMonitoring for Google Cloud Managed Prometheus
  podMonitoring:
    # Enable PodMonitoring creation
    enabled: false
    # Scrape interval
    interval: 30s
    # Additional labels for PodMonitoring
    additionalLabels: {}
    # Metric relabel configs to apply to samples before ingestion
    metricRelabeling: []

  # ServiceMonitor for Prometheus Operator environments (OpenShift, vanilla Kubernetes)
  # Can coexist with PodMonitoring (different environments)
  serviceMonitor:
    # Enable ServiceMonitor creation
    enabled: false
    # Scrape interval
    interval: 30s
    # Scrape timeout (must be less than interval)
    scrapeTimeout: 10s
    # Additional labels for ServiceMonitor to match Prometheus selector
    # Example: release: prometheus
    additionalLabels: {}
    # Namespace selector for cross-namespace monitoring
    # Example:
    #   matchNames:
    #     - hyperfleet-system
    namespaceSelector: {}
    # Honor labels from the target to avoid overwriting
    honorLabels: true
    # Metric relabel configs to apply to samples before ingestion
    metricRelabeling: []
    # Override the namespace where ServiceMonitor is created (defaults to release namespace)
    # When set, a namespaceSelector.matchNames is automatically added pointing to the
    # release namespace so Prometheus can discover the Service across namespaces.
    namespace: ""

  # PrometheusRule for alerting (requires Prometheus Operator or compatible system)
  prometheusRule:
    # Enable PrometheusRule creation
    # Note: GMP supports rules via Google Cloud Alerting, this is for Prometheus Operator compatibility
    enabled: false
    # Namespace where PrometheusRule will be created (defaults to release namespace)
    namespace: ""
    # Additional labels for PrometheusRule
    additionalLabels: {}
    alerts:
      sentinelPollStale:
        staleAfterSeconds: 60
        for: 1m

# Existing secret name (optional)
# If provided, the chart will not create a Secret and will use this existing one
# existingSecret: sentinel-broker-credentials
