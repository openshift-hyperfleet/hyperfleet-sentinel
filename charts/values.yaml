# Default values for sentinel.
# This is a YAML-formatted file.

# -- Number of sentinel replicas. Setting >1 duplicates events; scale via
# separate Helm releases with non-overlapping resourceSelector values instead.
# See docs/multi-instance-deployment.md.
replicaCount: 1

image:
  # -- Container image registry (no default — must be set)
  registry: CHANGE_ME
  # -- Container image repository (no default — must be set)
  repository: CHANGE_ME
  # -- Image pull policy
  pullPolicy: Always
  # -- Image tag (no default — must be set via `--set image.tag=<version>`)
  tag: ""

# -- Secrets for pulling images from private registries
imagePullSecrets: []
# -- Override the chart name used in resource names
nameOverride: ""
# -- Override the full release name used in resource names
fullnameOverride: ""

# -- ServiceAccount configuration
serviceAccount:
  # -- Create a ServiceAccount for the sentinel
  create: true
  # -- Annotations added to the ServiceAccount. For GCP Pub/Sub with
  # Workload Identity Federation, use `gcloud projects add-iam-policy-binding`
  # with the `principal://` format instead of annotations.
  annotations: {}
  # -- Override the ServiceAccount name (defaults to the release fullname)
  name: ""

# -- Additional annotations applied to all pods
podAnnotations: {}
# -- Additional labels applied to all pods
podLabels: {}

# -- Custom labels applied to all resources managed by this Helm chart
# (Deployment, Service, ServiceAccount, ConfigMaps, etc.)
# Useful for labeling resources for cleanup, tracking, or organization.
# Example:
#   labels:
#     environment: production
#     team: platform
#     hyperfleet-e2e-run: e2e-20260615-102422-bb5nfo2d
labels: {}

# -- Pod-level security context
podSecurityContext:
  # -- Filesystem group for volume mounts
  fsGroup: 65532
  # -- Run all containers as non-root
  runAsNonRoot: true
  # -- UID for all containers
  runAsUser: 65532

# -- Container-level security context
securityContext:
  # -- Mount root filesystem as read-only
  readOnlyRootFilesystem: true
  # -- Disallow privilege escalation
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# -- CPU and memory resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Node selector constraints for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- PodDisruptionBudget configuration
podDisruptionBudget:
  # -- Enable the PDB
  enabled: true
  # -- Maximum number of pods that can be unavailable during disruption
  maxUnavailable: 1

# -- Sentinel application configuration. All settings in this section
# generate the ConfigMap consumed by the sentinel.
config:
  # -- Sentinel identity settings
  sentinel:
    # -- Sentinel component name (templated with shard value when resource
    # selector is used)
    name: hyperfleet-sentinel-{{ .Values.config.resourceType }}

  # -- Log merged configuration on startup for debugging
  debugConfig: false

  # -- Logging configuration
  log:
    # -- Log level (`debug`, `info`, `warn`, `error`)
    level: info
    # -- Log format (`json` or `text`)
    format: json
    # -- Log output destination
    output: stdout

  # -- Client configuration
  clients:
    # -- HyperFleet API client settings
    hyperfleetApi:
      # -- API base URL (use in-cluster service name)
      baseUrl: http://hyperfleet-api:8000
      # -- API version
      version: v1
      # -- HTTP client timeout
      timeout: 10s
      # -- Optional JWT authentication via a Kubernetes projected service account token.
      # When enabled, a projected volume is mounted and the token is sent as a Bearer
      # Authorization header on every API request.
      auth:
        # -- Enable JWT authentication
        enabled: false
        # -- Audience for the projected service account token
        audience: hyperfleet-api
        # -- Full path where the token file is mounted in the container
        tokenPath: /var/run/secrets/hyperfleet/token
        # -- Token lifetime in seconds; Kubernetes rotates the token before it expires
        expirationSeconds: 3600
        # -- How long the token is cached in memory before the file is re-read; 0 disables caching
        tokenCacheTtl: 30s

  # -- Resource type plural to watch (any registered entity type, e.g. `clusters`, `nodepools`, `wifconfigs`)
  resourceType: clusters

  # -- How often to poll the API for resource updates
  pollInterval: 5s

  # -- CEL-based decision logic that determines whether to publish an event.
  # `params` are named CEL expressions evaluated in dependency order.
  # `result` is a boolean CEL expression using the params.
  # @default -- See values.yaml for default CEL expressions
  messageDecision:
    params:
      - name: ref_time
        expr: 'condition("Reconciled").last_updated_time'
      - name: is_reconciled
        expr: 'condition("Reconciled").status == "True"'
      - name: has_ref_time
        expr: 'ref_time != ""'
      - name: is_new_resource
        expr: 'resource.generation == 1 && !has_ref_time'
      - name: generation_mismatch
        expr: 'resource.generation > condition("Reconciled").observed_generation'
      - name: reconciled_and_stale
        expr: 'is_reconciled && has_ref_time && now - timestamp(ref_time) > duration("30m")'
      - name: not_reconciled_and_debounced
        expr: '!is_reconciled && has_ref_time && now - timestamp(ref_time) > duration("10s")'
    result: 'is_new_resource || generation_mismatch || reconciled_and_stale || not_reconciled_and_debounced'

  # -- Resource selector for horizontal sharding. Deploy multiple sentinel
  # instances with different shard values. Empty by default (no filtering).
  # Example: resourceSelector: [{label: shard, value: "1"}]
  resourceSelector: []

  # -- CloudEvents data payload configuration. Values are CEL expressions
  # evaluated against the resource.
  messageData:
    id: resource.id
    kind: resource.kind
    href: resource.href
    generation: resource.generation
#  For nodepools, the message should contain owner_references
#  owner_references:
#    id: "resource.owner_references.id"
#    href: "resource.owner_references.href"
#    kind: "resource.owner_references.kind"


# -- Broker configuration for event publishing.
# **WARNING:** Never commit real credentials to git. Use external secrets
# management (External Secrets Operator, Sealed Secrets, Vault).
broker:
  # -- Broker type (`rabbitmq` or `googlepubsub`).
  # See the [broker library](https://github.com/openshift-hyperfleet/hyperfleet-broker).
  type: rabbitmq

  # -- Topic name for event publishing. Default uses Helm template
  # `{namespace}-{resourceType}` for multi-tenant isolation.
  topic: '{{ .Release.Namespace }}-{{ .Values.config.resourceType }}'

  # -- RabbitMQ configuration
  rabbitmq:
    # -- Connection URL (`amqp://user:password@host:port/vhost`)
    url: amqp://<USER>:<PASSWORD>@rabbitmq.hyperfleet-system.svc.cluster.local:5672/hyperfleet
    # -- Exchange type
    exchangeType: topic

  # -- Google Pub/Sub configuration
  googlepubsub:
    # -- GCP project ID (required when using Pub/Sub)
    projectId: your-gcp-project-id
    # -- Maximum outstanding messages
    maxOutstandingMessages: 1000
    # -- Number of subscriber goroutines
    numGoroutines: 10
    # -- Auto-create topic if it does not exist (use `false` in production)
    createTopicIfMissing: false

# -- Monitoring and metrics configuration
monitoring:
  # -- PodMonitoring for Google Cloud Managed Prometheus (GMP)
  podMonitoring:
    # -- Create a PodMonitoring resource
    enabled: false
    # -- Scrape interval
    interval: 30s
    # -- Additional labels for PodMonitoring discovery
    additionalLabels: {}
    # -- Metric relabel configs applied before ingestion
    metricRelabeling: []

  # -- ServiceMonitor for Prometheus Operator environments
  serviceMonitor:
    # -- Create a ServiceMonitor resource
    enabled: false
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout (must be less than interval)
    scrapeTimeout: 10s
    # -- Additional labels for ServiceMonitor discovery
    additionalLabels: {}
    # -- Namespace selector for cross-namespace monitoring
    namespaceSelector: {}
    # -- Honor labels from the target to avoid overwriting
    honorLabels: true
    # -- Metric relabel configs applied before ingestion
    metricRelabeling: []
    # -- Override the namespace where ServiceMonitor is created (defaults to release namespace)
    namespace: ""

  # -- PrometheusRule for alerting (requires Prometheus Operator)
  prometheusRule:
    # -- Create PrometheusRule resources
    enabled: false
    # -- Namespace to create the PrometheusRule in (defaults to release namespace)
    namespace: ""
    # -- Additional labels for PrometheusRule discovery
    additionalLabels: {}
    # -- Alert rule configuration
    alerts:
      # -- Poll staleness alert
      sentinelPollStale:
        # -- Seconds after which a poll is considered stale
        staleAfterSeconds: 60
        # -- Duration before the alert fires
        for: 1m

# -- Distributed tracing configuration (OpenTelemetry)
tracing:
  # -- Enable trace export
  enabled: false
  # -- Service name reported in traces
  serviceName: "hyperfleet-sentinel"
  # -- OTLP exporter endpoint (traces go to stdout when empty)
  otlpEndpoint: ""
  # -- OTLP protocol (`grpc` or `http/protobuf`)
  otlpProtocol: "grpc"
  # -- Sampler type
  sampler: "parentbased_traceidratio"
  # -- Sampling rate (`1.0` for dev, `0.01` for production)
  samplerArg: "1.0"
  # -- Context propagation formats
  propagators: "tracecontext,baggage"

# Existing secret name (optional)
# If provided, the chart will not create a Secret and will use this existing one
# existingSecret: sentinel-broker-credentials
