# Sentinel Configuration Example - Development
#
# This example demonstrates a minimal development configuration
# with shorter intervals for faster local testing.
#
# For local development with RabbitMQ (easiest option):
#
# Quick start with Docker:
#   docker run -d --name rabbitmq -p 5672:5672 -p 15672:15672 rabbitmq:3-management
#   export BROKER_RABBITMQ_URL=amqp://guest:guest@localhost:5672/
#   ./bin/sentinel serve --config=configs/dev-example.yaml
#
# Or configure via broker.yaml (see broker.yaml in project root)

# Sentinel information
sentinel:
  name: hyperfleet-sentinel-clusters

# Debug configuration - log merged config on startup
debug_config: false

# Enable or disable distributed tracing
tracing_enabled: false

# Logging configuration (can be overridden by HYPERFLEET_LOG_* env vars or --log-* flags)
log:
  level: "info"
  format: "text"
  output: "stdout"

# Client configurations
clients:
  # HyperFleet API client configuration
  hyperfleet_api:
    # Local development API endpoint
    # Adjust this to match your local HyperFleet API instance
    base_url: http://localhost:8000
    version: "v1"
    timeout: 10s

  # Broker configuration
  # Note: broker implementation details (RabbitMQ URL, etc.) are in broker.yaml
  broker:
    topic: ""  # Can be overridden by HYPERFLEET_BROKER_TOPIC

# Resource type to watch - must be one of: clusters, nodepools
resource_type: clusters

# Faster polling for development - see changes quickly.
poll_interval: 2s

# Decision logic for publishing events (CEL expressions).
# Shorter debounce intervals for development.
message_decision:
  params:
    ref_time: 'condition("Ready").last_updated_time'
    is_ready: 'condition("Ready").status == "True"'
    has_ref_time: 'ref_time != ""'
    is_new_resource: '!is_ready && resource.generation == 1'
    generation_mismatch: 'resource.generation > condition("Ready").observed_generation'
    ready_and_stale: 'is_ready && has_ref_time && now - timestamp(ref_time) > duration("2m")'
    not_ready_and_debounced: '!is_ready && has_ref_time && now - timestamp(ref_time) > duration("5s")'
  result: "is_new_resource || generation_mismatch || ready_and_stale || not_ready_and_debounced"

# Messaging system type for OpenTelemetry tracing attributes.
# Should match the actual message broker being used for accurate observability.
# Valid values: rabbitmq, gcp_pubsub, kafka, activemq, aws_sqs, etc.
# Can be overridden via MESSAGING_SYSTEM environment variable.
messaging_system: "rabbitmq"

# No resource selector - watch all resources in development.
# resource_selector: []

# CloudEvent payload configuration.
#
# Each property value is a CEL expression evaluated against "resource" and "reason".
# A nested map builds a nested object — each leaf value is still a CEL expression.
#
# Available CEL variables:
#   resource — the HyperFleet resource (id, kind, href, generation, status, labels, ...)
#   reason   — the decision reason string (e.g. "message decision matched")
#
# Examples:
#   field: "resource.id"                                    — field access
#   field: 'condition("Ready").status == "True" ? "Ready" : "NotReady"'  — conditional
#   field: '"constant"'                                     — CEL string literal
#   field: "reason"                                         — decision reason
#
# Note: if a field path does not exist on the resource, the key is silently omitted
# from the payload with no error. Check your field names carefully.
message_data:
  id: "resource.id"
  kind: "resource.kind"
  href: "resource.href"
  generation: "resource.generation"

#  For nodepools, the message should contain owner_references
#  
#  owner_references:
#    id: "resource.owner_references.id"
#    href: "resource.owner_references.href"
#    kind: "resource.owner_references.kind"

  # examples of other possible fields
  #ready_status: 'resource.status.conditions.filter(c, c.type=="Ready")[0].value == "True" ? "Ready" : "NotReady"'
  #origin: "hyperfleet-sentinel"

# For local development, use environment variable:
#   export BROKER_RABBITMQ_URL=amqp://guest:guest@localhost:5672/
#
# Or create a broker.yaml file:
#   broker:
#     type: rabbitmq
#     rabbitmq:
#       url: amqp://guest:guest@localhost:5672/
#       exchange_type: topic
#
# RabbitMQ Management UI: http://localhost:15672 (guest/guest)
