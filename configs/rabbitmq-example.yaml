# Sentinel Configuration Example - RabbitMQ
#
# This example demonstrates a production configuration using RabbitMQ
# as the message broker.
#
# Configure the broker using either:
#   1. broker.yaml file (see broker.yaml in project root)
#   2. BROKER_CONFIG_FILE environment variable pointing to your broker config
#   3. Direct environment variables:
#      BROKER_RABBITMQ_URL=amqp://user:pass@rabbitmq.example.com:5672/vhost
#
# For more details, see: https://github.com/openshift-hyperfleet/hyperfleet-broker

# Resource type to watch - must be one of: clusters, nodepools.
resource_type: clusters

# How often to poll the HyperFleet API for resource updates.
# Accepts Go duration format: ns, us/µs, ms, s, m, h.
poll_interval: 5s

# Decision logic for publishing events (CEL expressions).
# Uses condition-based checks with configurable thresholds.
message_decision:
  params:
    ref_time: 'condition("Ready").last_updated_time'
    is_ready: 'condition("Ready").status == "True"'
    has_ref_time: 'ref_time != ""'
    is_new_resource: '!is_ready && resource.generation == 1'
    ready_and_stale: 'is_ready && has_ref_time && now - timestamp(ref_time) > duration("30m")'
    not_ready_and_debounced: '!is_ready && has_ref_time && now - timestamp(ref_time) > duration("10s")'
  result: "is_new_resource || ready_and_stale || not_ready_and_debounced"

# Messaging system type for OpenTelemetry tracing attributes.
# Should match the actual message broker being used for accurate observability.
# Valid values: rabbitmq, gcp_pubsub, kafka, activemq, aws_sqs, etc.
# Can be overridden via MESSAGING_SYSTEM environment variable.
messaging_system: "rabbitmq"

# Resource selector (optional) - filter resources by labels.
# If empty or omitted, all resources of the specified type are watched.
# This enables horizontal scaling by having multiple Sentinels watch different resource subsets.
# Multiple selectors use AND logic (all labels must match).
resource_selector:
  - label: shard
    value: "1"
  - label: datacenter
    value: dc-east

# HyperFleet API configuration.
hyperfleet_api:
  # API base URL (required).
  endpoint: http://hyperfleet-api.hyperfleet-system.svc.cluster.local:8080

  # Request timeout for API calls.
  timeout: 5s

# CloudEvent payload configuration.
#
# Each property value is a CEL expression evaluated against "resource" and "reason".
# A nested map builds a nested object — each leaf value is still a CEL expression.
#
# Available CEL variables:
#   resource — the HyperFleet resource (id, kind, href, generation, status, labels, ...)
#   reason   — the decision reason string (e.g. "message decision matched")
#
# Examples:
#   field: "resource.id"                                    — field access
#   field: 'condition("Ready").status == "True" ? "Ready" : "NotReady"'  — conditional
#   field: '"constant"'                                     — CEL string literal
#   field: "reason"                                         — decision reason
#
# Note: if a field path does not exist on the resource, the key is silently omitted
# from the payload with no error. Check your field names carefully.
message_data:
  id: "resource.id"
  kind: "resource.kind"
  href: "resource.href"
  generation: "resource.generation"

#  For nodepools, the message should contain owner_references
#  
#  owner_references:
#    id: "resource.owner_references.id"
#    href: "resource.owner_references.href"
#    kind: "resource.owner_references.kind"

# See broker.yaml for configuration options.
#
# Example RabbitMQ configuration in broker.yaml:
#   broker:
#     type: rabbitmq
#     rabbitmq:
#       url: amqp://user:password@rabbitmq.hyperfleet-system.svc.cluster.local:5672/
#       exchange_type: topic
#
# Or use environment variables:
#   BROKER_RABBITMQ_URL=amqp://user:password@rabbitmq.hyperfleet-system.svc.cluster.local:5672/
#
# In Kubernetes, credentials should be provided via Secrets.
