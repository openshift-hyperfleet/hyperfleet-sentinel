# this is an invalid config for tests
# it has a nil in the message_data.id property
resource_type: clusters
poll_interval: 2s

conditions:
  reference_time: 'conditionTime(resource, "Ready")'
  rules:
    - name: isReady
      expression: 'status(resource, "Ready") == "True"'
      max_age: 2m
    - name: isNotReady
      expression: 'status(resource, "Ready") == "False"'
      max_age: 5s

hyperfleet_api:
  endpoint: http://localhost:8000
  timeout: 10s
message_data:
  id:
  kind: "resource.kind"
