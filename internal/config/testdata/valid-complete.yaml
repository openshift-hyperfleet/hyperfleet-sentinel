resource_type: clusters
poll_interval: 5s

conditions:
  reference_time: 'conditionTime(resource, "Ready")'
  rules:
    - name: isReady
      expression: 'status(resource, "Ready") == "True"'
      max_age: 30m
    - name: isNotReady
      expression: 'status(resource, "Ready") == "False"'
      max_age: 10s

resource_selector:
  - label: region
    value: us-east
  - label: environment
    value: production

hyperfleet_api:
  endpoint: https://api.hyperfleet.example.com
  timeout: 5s

message_data:
  id: "resource.id"
  kind: "resource.kind"
  region: "resource.labels.region"
