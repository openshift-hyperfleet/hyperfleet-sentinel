sentinel:
  name: hyperfleet-sentinel-test

debug_config: false

log:
  level: "info"
  format: "json"
  output: "stdout"

clients:
  hyperfleet_api:
    base_url: https://api.hyperfleet.example.com
    version: "v1"
    timeout: 10s
    retry_attempts: 3
    retry_backoff: "exponential"
    base_delay: "1s"
    max_delay: "30s"
  broker:
    topic: "test-topic"

resource_type: clusters
poll_interval: 5s
max_age_not_ready: 10s
max_age_ready: 30m

resource_selector:
  - label: region
    value: us-east
  - label: environment
    value: production

message_data:
  id: "resource.id"
  kind: "resource.kind"
  region: "resource.labels.region"
