resource_type: nodepools
poll_interval: 3s

conditions:
  reference_time: 'conditionTime(resource, "Ready")'
  rules:
    - name: isReady
      expression: 'status(resource, "Ready") == "True"'
      max_age: 15m
    - name: isNotReady
      expression: 'status(resource, "Ready") == "False"'
      max_age: 5s

resource_selector:
  - label: cluster-id
    value: cls-123
  - label: region
    value: eu-west

hyperfleet_api:
  endpoint: http://hyperfleet-api.hyperfleet-system.svc.cluster.local:8080
  timeout: 20s

message_data:
  id: "resource.id"
  kind: "resource.kind"
  cluster_id: "resource.owner_references.id"
  generation: "resource.generation"
