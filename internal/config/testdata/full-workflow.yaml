resource_type: nodepools
poll_interval: 3s
max_age_not_ready: 5s
max_age_ready: 15m

resource_selector:
  - label: cluster-id
    value: cls-123
  - label: region
    value: eu-west

hyperfleet_api:
  endpoint: http://hyperfleet-api.hyperfleet-system.svc.cluster.local:8080
  timeout: 20s

message_data:
  id: "resource.id"
  kind: "resource.kind"
  cluster_id: "resource.owner_references.id"
  generation: "resource.generation"
