sentinel:
  name: hyperfleet-sentinel-nodepools

debug_config: false

log:
  level: "info"
  format: "text"
  output: "stdout"

clients:
  hyperfleet_api:
    base_url: http://hyperfleet-api.hyperfleet-system.svc.cluster.local:8080
    version: "v1"
    timeout: 20s
    retry_attempts: 3
    retry_backoff: "exponential"
    base_delay: "1s"
    max_delay: "30s"
  broker:
    topic: ""

resource_type: nodepools
poll_interval: 3s
max_age_not_ready: 5s
max_age_ready: 15m

resource_selector:
  - label: cluster-id
    value: cls-123
  - label: region
    value: eu-west

message_data:
  id: "resource.id"
  kind: "resource.kind"
  cluster_id: "resource.owner_references.id"
  generation: "resource.generation"
